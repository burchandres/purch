services:
  postgres:
    container_name: purch-postgres
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - purch

  redis:
    container_name: purch-redis
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - purch

  purch:
    build:
      context: .
      dockerfile: docker/dockerfile.purch
    volumes:
      - ./.env:/app/.env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - purch

networks:
  purch:

volumes:
  postgres_data:
  redis_data:
