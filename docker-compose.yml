services:
  postgres:
    container_name: purch-postgres
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      interval: 2s
      timeout: 3s
      retries: 40
    networks:
      - purch

  redis:
    container_name: purch-redis
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - purch

  purch:
    &purch
    build:
      context: .
      dockerfile: docker/dockerfile.purch
    command: fastapi dev purch/main.py --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - purch
    secrets:
      - env_file

  taskiq-worker:
    <<: *purch
    ports: []
    command: taskiq worker purch.infrastructure.taskiq:broker --fs-discover
    restart: unless-stopped
    networks:
      - purch

  taskiq-scheduler:
    <<: *purch
    ports: []
    command: taskiq scheduler purch.infrastructure.taskiq:scheduler --fs-discover
    restart: unless-stopped
    networks:
      - purch

  
networks:
  purch:

volumes:
  postgres_data:
  redis_data:

secrets:
  env_file:
    file: .env
