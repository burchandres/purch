services:
  test-postgres:
    container_name: test-purch-postgres
    image: postgres:latest
    ports:
      - "15432:5432"  # Different port to avoid conflicts
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    tmpfs:
      - /var/lib/postgresql/data  # Use tmpfs for faster tests
    networks:
      - test_purch
    secrets:
      - env_file

  test-redis:
    container_name: test-purch-redis
    image: redis:alpine
    ports:
      - "16379:6379"  # Different port to avoid conflicts
    tmpfs:
      - /data  # Use tmpfs for faster tests
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 5s
    networks:
      - test_purch
    secrets:
      - env_file

  test-purch:
    build:
      context: .
      dockerfile: docker/dockerfile.test
    command: /app/.venv/bin/pytest --cov=purch tests/ -v # --cov-report=html:/app/coverage/html --cov-report=xml:/app/coverage/coverage.xml --cov-report=term-missing --junit-xml=/app/test-results/junit.xml
    volumes:
      - test_coverage:/app/coverage  # Persist coverage reports
    depends_on:
      test-postgres:
        condition: service_started
      test-redis:
        condition: service_healthy
    networks:
      - test_purch
    secrets:
      - env_file

  test-taskiq-worker:
    build:
      context: .
      dockerfile: docker/dockerfile.test
    command: /app/.venv/bin/taskiq worker purch.core:broker
    depends_on:
      test-redis:
        condition: service_healthy 
    restart: unless-stopped
    networks:
      - test_purch
    secrets:
      - env_file

  test-taskiq-scheduler:
    build:
      context: .
      dockerfile: docker/dockerfile.test
    command: /app/.venv/bin/taskiq scheduler purch.core:scheduler
    depends_on:
      test-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - test_purch
    secrets:
      - env_file


networks:
  test_purch:

volumes:
  test_coverage:

secrets:
  env_file:
    file: .env